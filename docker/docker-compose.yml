services:
  edgar-mcp:
    build:
      context: ../mcp-services/edgar-mcp
      dockerfile: Dockerfile
    ports:
      - "9870:9870"
    env_file:
      - ../.env
    restart: unless-stopped

  yahoo-finance-mcp:
    build:
      context: ../mcp-services/yahoo-finance-mcp
      dockerfile: Dockerfile
    ports:
      - "8809:8809"
    restart: unless-stopped

  price-data-mcp:
    build:
      context: ../mcp-services/price-data-mcp
      dockerfile: Dockerfile
    ports:
      - "8810:8810"
    env_file:
      - ../.env
    restart: unless-stopped
