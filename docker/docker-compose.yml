services:
  edgar-mcp:
    build:
      context: ../mcp-services/edgar-mcp
      dockerfile: Dockerfile
    ports:
      - "9870:9870"
    env_file:
      - ../.env
    restart: unless-stopped

  yahoo-finance-mcp:
    build:
      context: ../mcp-services/yahoo-finance-mcp
      dockerfile: Dockerfile
    ports:
      - "8809:8809"
    restart: unless-stopped

  price-data-mcp:
    build:
      context: ..
      dockerfile: mcp-services/price-data-mcp/Dockerfile
    ports:
      - "8810:8810"
    env_file:
      - ../.env
    restart: unless-stopped

  schwab-price-sync:
    build:
      context: ..
      dockerfile: services/schwab-price-sync/Dockerfile
    env_file:
      - ../.env
    restart: unless-stopped

  schwab-automation:
    build:
      context: ..
      dockerfile: services/schwab-automation/Dockerfile
    env_file:
      - ../.env
    restart: unless-stopped
