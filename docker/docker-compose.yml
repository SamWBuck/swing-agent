services:
  edgar-mcp:
    build:
      context: ../mcp-services/edgar-mcp
      dockerfile: Dockerfile
    ports:
      - "9870:9870"
    environment:
      # Required: identify yourself to the SEC EDGAR API.
      # Set this in a .env file next to docker-compose.yml.
      # Format: "First Last (email@example.com)"
      SEC_EDGAR_USER_AGENT: ${SEC_EDGAR_USER_AGENT:-}
    restart: unless-stopped

  yahoo-finance-mcp:
    build:
      context: ../mcp-services/yahoo-finance-mcp
      dockerfile: Dockerfile
    ports:
      - "8808:8808"
    environment:
      # Optional: set PROXY_URL in a .env file next to docker-compose.yml
      # e.g.  PROXY_URL=http://proxy.example.com:8080
      PROXY_URL: ${PROXY_URL:-}
    restart: unless-stopped
